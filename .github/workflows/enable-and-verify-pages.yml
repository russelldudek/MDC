name: Enable and verify candidate vision

on:
  push:
    paths:
      - .github/workflows/enable-and-verify-pages.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  publish-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Pages from main root
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/pages.json <<'JSON'
          {"build_type":"legacy","source":{"branch":"main","path":"/"}}
          JSON
          if gh api "repos/${GITHUB_REPOSITORY}/pages" >/tmp/pages-current.json 2>/tmp/pages-error.txt; then
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" --input /tmp/pages.json >/tmp/pages-updated.json
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" --input /tmp/pages.json >/tmp/pages-created.json
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds" >/tmp/pages-build.json || true

      - name: Verify first live publication
        shell: bash
        run: |
          set -euo pipefail
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"
          ok=0
          for attempt in $(seq 1 90); do
            if curl -fsSL --max-time 30 "${BASE}" | grep -Fq 'Build the company' \
              && curl -fsSL --max-time 30 "${BASE}resume.html" | grep -Fq 'View Cover Letter' \
              && curl -fsSL --max-time 30 "${BASE}cover-letter.html" | grep -Fq 'View Resume' \
              && test "$(curl -fsSL --max-time 30 "${BASE}docs/Russell-Dudek-COO-AI-Adoption-Resume.pdf" | head -c 4)" = '%PDF'; then
              ok=1
              break
            fi
            sleep 10
          done
          test "$ok" = 1

      - name: Write final live verification receipt and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          TOKEN="pages-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          SOURCE_SHA="$(git rev-parse HEAD)"
          python - "$TOKEN" "$SOURCE_SHA" <<'PY'
          from pathlib import Path
          import json, sys
          token, source_sha = sys.argv[1:]
          audit = Path('campaign-audit.md')
          text = audit.read_text(encoding='utf-8')
          heading = '## Publication status\n\n'
          before, sep, _ = text.partition(heading)
          assert sep
          status = (
              'Campaign state: complete.\n\n'
              'Live GitHub Pages verification passed for the candidate vision, reciprocal resume/cover-letter routes, and native PDF delivery.\n\n'
              f'Live verification token: `{token}`\n\n'
              f'Audited publication source SHA: `{source_sha}`\n'
          )
          audit.write_text(before + heading + status, encoding='utf-8')
          Path('live-verification.json').write_text(json.dumps({
              'status': 'passed',
              'token': token,
              'audited_publication_source_sha': source_sha,
              'live_site': 'https://russelldudek.github.io/MDC/',
              'verified_routes': [
                  'index.html',
                  'resume.html',
                  'cover-letter.html',
                  'docs/Russell-Dudek-COO-AI-Adoption-Resume.pdf'
              ]
          }, indent=2) + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/enable-and-verify-pages.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'candidate-campaign-publisher'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "Record verified live candidate vision"
          git push origin HEAD:main
          echo "TOKEN=${TOKEN}" >> "$GITHUB_ENV"

      - name: Request final build and verify receipt from final main
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds" >/tmp/pages-final-build.json || true
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"
          ok=0
          for attempt in $(seq 1 90); do
            if curl -fsSL --max-time 30 "${BASE}live-verification.json" | grep -Fq "${TOKEN}" \
              && curl -fsSL --max-time 30 "${BASE}" | grep -Fq 'Build the company' \
              && test "$(curl -fsSL --max-time 30 "${BASE}docs/Russell-Dudek-COO-AI-Adoption-Resume.pdf" | head -c 4)" = '%PDF'; then
              ok=1
              break
            fi
            sleep 10
          done
          test "$ok" = 1
