name: Verify live GPU campaign

on:
  push:
    paths:
      - .github/workflows/live-gpu-audit.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify corrected candidate surfaces and publish receipt
        shell: bash
        run: |
          set -euo pipefail
          BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
          TOKEN="mdc-gpu-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CONTENT_SHA="$(git rev-parse HEAD)"
          PATHS=(
            index.html
            hero-2026.css
            hero-gpu-core.js
            hero-gpu-fallbacks.js
            hero-gpu.js
            app.js
            resume.html
            cover-letter.html
            docs/Russell-Dudek-COO-AI-Adoption-Resume.pdf
          )

          passed=0
          for attempt in $(seq 1 60); do
            ok=1
            rm -rf /tmp/mdc-live && mkdir -p /tmp/mdc-live
            for path in "${PATHS[@]}"; do
              mkdir -p "/tmp/mdc-live/$(dirname "$path")"
              if ! curl -fsSL --max-time 30 "${BASE}${path}" -o "/tmp/mdc-live/${path}"; then
                ok=0
                break
              fi
              if ! cmp -s "$path" "/tmp/mdc-live/${path}"; then
                ok=0
                break
              fi
            done
            if [ "$ok" = 1 ] \
              && grep -Fq 'GPU operating simulation' /tmp/mdc-live/index.html \
              && grep -Fq 'hero-gpu-core.js' /tmp/mdc-live/index.html \
              && grep -Fq 'createWebGPUBackend' /tmp/mdc-live/hero-gpu-core.js \
              && grep -Fq 'createWebGL2Backend' /tmp/mdc-live/hero-gpu-fallbacks.js \
              && grep -Fq '.engagement-system' /tmp/mdc-live/hero-2026.css \
              && grep -Fq 'rendererMode' /tmp/mdc-live/app.js \
              && grep -Fq 'View Cover Letter' /tmp/mdc-live/resume.html \
              && grep -Fq 'View Resume' /tmp/mdc-live/cover-letter.html \
              && test "$(head -c 4 /tmp/mdc-live/docs/Russell-Dudek-COO-AI-Adoption-Resume.pdf)" = '%PDF'; then
              passed=1
              break
            fi
            sleep 10
          done
          test "$passed" = 1

          VERIFIED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python - "$TOKEN" "$CONTENT_SHA" "$VERIFIED_AT" <<'PY'
          from pathlib import Path
          import json, sys
          token, content_sha, verified_at = sys.argv[1:]
          Path('live-verification.json').write_text(json.dumps({
              'status': 'passed',
              'token': token,
              'verified_at': verified_at,
              'live_site': 'https://russelldudek.github.io/MDC/',
              'audited_candidate_content_sha': content_sha,
              'verified_renderer_assets': [
                  'hero-2026.css', 'hero-gpu-core.js',
                  'hero-gpu-fallbacks.js', 'hero-gpu.js', 'app.js'
              ],
              'verified_routes': [
                  'index.html', 'resume.html', 'cover-letter.html',
                  'docs/Russell-Dudek-COO-AI-Adoption-Resume.pdf'
              ],
              'renderer_contract': {
                  'desktop': 'WebGPU first; WebGL2 and Canvas fallbacks',
                  'mobile': 'semantic composition without GPU initialization',
                  'reduced_motion': 'immediate semantic settlement'
              }
          }, indent=2) + '\n', encoding='utf-8')

          audit = Path('campaign-audit.md')
          text = audit.read_text(encoding='utf-8')
          before, marker, _ = text.partition('## Publication status\n')
          assert marker
          status = f'''## Publication status

- Campaign state: complete
- Live site: `https://russelldudek.github.io/MDC/`
- Exact candidate asset comparison against audited source: passed
- Native WebGPU, WebGL2 fallback, Canvas fallback, and semantic mobile source delivery: passed
- Homepage, resume, cover-letter, and resume PDF delivery: passed
- Exact live verification token: `{token}`
- Audited candidate-content SHA: `{content_sha}`
- Verified at: `{verified_at}`
- Temporary publication workflow: removed from final `main`
'''
          audit.write_text(before + status, encoding='utf-8')
          PY

          rm -f .github/workflows/live-gpu-audit.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'candidate-campaign-publisher'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize live GPU campaign verification'
          git push origin HEAD:main

          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds" >/tmp/pages-build.json
          receipt=0
          for attempt in $(seq 1 60); do
            if curl -fsSL --max-time 30 "${BASE}live-verification.json" | grep -Fq "$TOKEN" \
              && curl -fsSL --max-time 30 "${BASE}campaign-audit.md" | grep -Fq "$TOKEN"; then
              receipt=1
              break
            fi
            sleep 10
          done
          test "$receipt" = 1
