name: Diagnose candidate vision publication

on:
  push:
    paths:
      - .github/workflows/pages-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Diagnose Pages API and live route
        shell: bash
        run: |
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/pages" > /tmp/get.out 2> /tmp/get.err
          GET_EXIT=$?
          cat > /tmp/pages.json <<'JSON'
          {"build_type":"legacy","source":{"branch":"main","path":"/"}}
          JSON
          if [ "$GET_EXIT" -ne 0 ]; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pages" --input /tmp/pages.json > /tmp/config.out 2> /tmp/config.err
          else
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/pages" --input /tmp/pages.json > /tmp/config.out 2> /tmp/config.err
          fi
          CONFIG_EXIT=$?
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds" > /tmp/build.out 2> /tmp/build.err
          BUILD_EXIT=$?
          sleep 30
          BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"
          LIVE_CODE=$(curl -L -sS -o /tmp/live.html -w '%{http_code}' --max-time 30 "$BASE")
          CURL_EXIT=$?
          if grep -Fq 'Build the company' /tmp/live.html 2>/dev/null; then LIVE_MATCH=true; else LIVE_MATCH=false; fi
          export GET_EXIT CONFIG_EXIT BUILD_EXIT LIVE_CODE CURL_EXIT LIVE_MATCH BASE
          python - <<'PY'
          from pathlib import Path
          import json, os
          def read(path):
              return Path(path).read_text(encoding='utf-8', errors='replace')[:8000] if Path(path).exists() else ''
          passed = os.environ['LIVE_CODE'] == '200' and os.environ['LIVE_MATCH'] == 'true'
          result = {
              'status': 'passed' if passed else 'blocked',
              'pages_get_exit': int(os.environ['GET_EXIT']),
              'pages_config_exit': int(os.environ['CONFIG_EXIT']),
              'pages_build_exit': int(os.environ['BUILD_EXIT']),
              'live_http_status': os.environ['LIVE_CODE'],
              'live_content_match': os.environ['LIVE_MATCH'] == 'true',
              'live_site': os.environ['BASE'],
              'pages_get_error': read('/tmp/get.err'),
              'pages_config_error': read('/tmp/config.err'),
              'pages_build_error': read('/tmp/build.err'),
          }
          Path('pages-diagnostic.json').write_text(json.dumps(result, indent=2) + '\n', encoding='utf-8')
          if passed:
              Path('live-verification.json').write_text(json.dumps({
                  'status': 'passed',
                  'live_site': os.environ['BASE'],
                  'verified_by': 'GitHub-hosted publication diagnostic',
                  'source_sha': os.environ.get('GITHUB_SHA', '')
              }, indent=2) + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/enable-and-verify-pages.yml .github/workflows/pages-diagnostic.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'candidate-campaign-publisher'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Record candidate vision publication diagnostic'
          git push origin HEAD:main
