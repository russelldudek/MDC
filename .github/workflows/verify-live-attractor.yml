name: Verify live Operating Attractor Field

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-live-site:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Wait for GitHub Pages and verify exact public surface
        shell: bash
        run: |
          set -euo pipefail
          base='https://russelldudek.github.io/MDC'
          token='${{ github.event.pull_request.head.sha }}'
          passed=false

          for attempt in $(seq 1 60); do
            page="$(curl --fail --silent --show-error --location --connect-timeout 10 --max-time 30 "$base/?verify=$token-$attempt" || true)"
            css_status="$(curl --silent --output /tmp/attractor.css --write-out '%{http_code}' --location --connect-timeout 10 --max-time 30 "$base/operating-attractor.css?verify=$token-$attempt" || true)"
            js_status="$(curl --silent --output /tmp/attractor.js --write-out '%{http_code}' --location --connect-timeout 10 --max-time 30 "$base/operating-attractor.js?verify=$token-$attempt" || true)"

            if [[ "$page" == *'Operating Stress Test'* ]] \
              && [[ "$page" == *'id="operating-attractor"'* ]] \
              && [[ "$page" != *'Promise Compiler'* ]] \
              && [[ "$css_status" == '200' ]] \
              && [[ "$js_status" == '200' ]] \
              && grep -q '.operating-attractor' /tmp/attractor.css \
              && grep -q 'data-stress-scenario' /tmp/attractor.js; then
              passed=true
              printf '%s\n' 'Live GitHub Pages verification passed.'
              break
            fi

            sleep 10
          done

          if ! $passed; then
            printf '%s\n' 'GitHub Pages did not serve the corrected source within the verification window.' >&2
            exit 1
          fi
