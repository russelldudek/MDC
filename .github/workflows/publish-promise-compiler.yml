name: Publish Promise Compiler

on:
  push:
    paths:
      - .github/workflows/publish-promise-compiler.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install audited Promise Compiler campaign
        shell: bash
        run: |
          set -euo pipefail
          cat .publish/chunk-00.b64 .publish/chunk-01.b64 > /tmp/promise-compiler.b64
          base64 --decode /tmp/promise-compiler.b64 > /tmp/promise-compiler.tar.gz
          tar -xzf /tmp/promise-compiler.tar.gz -C .

          rm -f hero-2026.css hero-gpu-core.js hero-gpu-fallbacks.js hero-gpu.js
          rm -rf .publish
          rm -f .github/workflows/publish-promise-compiler.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

          git config user.name 'candidate-campaign-publisher'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Replace dashboard hero with Promise Compiler'
          git push origin HEAD:main
