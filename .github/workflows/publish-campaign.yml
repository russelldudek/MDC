name: Publish COO candidate campaign

on:
  push:
    paths:
      - .github/workflows/publish-campaign.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-coo-candidate-campaign
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct audited source package
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/chunk-* > /tmp/mdc-source.b64
          base64 --decode /tmp/mdc-source.b64 > /tmp/mdc-source.tar.gz
          echo "ac47deac95a8ced585c24c2172780c1fad6779f83f947bff0f80d00493117265  /tmp/mdc-source.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/mdc-source.tar.gz -C .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install document renderer
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install beautifulsoup4 playwright pypdf
          python -m playwright install --with-deps chromium

      - name: Generate PDFs from authoritative HTML
        run: python scripts/generate_pdfs.py

      - name: Verify source, links, confidentiality and PDF contracts
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup
          from pypdf import PdfReader
          import re

          base = Path('.')
          required = [
              'index.html', 'resume.html', 'cover-letter.html', 'interview-brief.html',
              '120-day-plan.html', 'founder-operating-contract.html', 'role-alignment.html',
              'styles.css', 'brand-tokens.css', 'app.js', 'brand-intelligence.md',
              'role-intelligence.md', 'evidence-map.md', 'source-notes.md',
              'artifact-manifest.md', 'campaign-audit.md', 'assets/brand/README.md',
              '.nojekyll', 'scripts/generate_pdfs.py',
          ]
          for rel in required:
              assert (base / rel).is_file(), f'missing required file: {rel}'

          private_terms = [
              re.compile('role' + r'\s*[- ]?\s*' + 'forge', re.I),
              re.compile('russelldudek/' + 'role' + 'forge', re.I),
              re.compile('key' + 'delta', re.I),
          ]
          for path in base.rglob('*'):
              if not path.is_file() or '.git' in path.parts or '.bootstrap' in path.parts or '.github' in path.parts or path.suffix.lower() == '.pdf':
                  continue
              rel = str(path)
              text = path.read_text(encoding='utf-8', errors='ignore')
              for rx in private_terms:
                  assert not rx.search(rel), f'private term in filename: {rel}'
                  assert not rx.search(text), f'private term in file: {rel}'

          for page in base.glob('*.html'):
              soup = BeautifulSoup(page.read_text(encoding='utf-8'), 'html.parser')
              assert soup.find('h1'), f'missing h1: {page.name}'
              for anchor in soup.find_all('a', href=True):
                  href = anchor['href']
                  if href.startswith(('http://', 'https://', 'mailto:', 'tel:', '#')):
                      continue
                  target = href.split('#')[0]
                  if target:
                      assert (base / target).exists(), f'broken link from {page.name}: {href}'

          resume = BeautifulSoup((base / 'resume.html').read_text(encoding='utf-8'), 'html.parser')
          cover = BeautifulSoup((base / 'cover-letter.html').read_text(encoding='utf-8'), 'html.parser')
          assert resume.find('a', href='cover-letter.html')
          assert cover.find('a', href='resume.html')

          expected = {
              'Russell-Dudek-COO-AI-Adoption-Resume.pdf': 2,
              'Russell-Dudek-COO-AI-Adoption-Cover-Letter.pdf': 1,
              'Russell-Dudek-COO-AI-Adoption-Interview-Thesis.pdf': 3,
              'Russell-Dudek-COO-AI-Adoption-120-Day-Plan.pdf': 2,
              'Russell-Dudek-Founder-Operating-Contract.pdf': 2,
              'Russell-Dudek-COO-AI-Adoption-Role-Alignment.pdf': 1,
          }
          contacts = ['412.287.8640', 'russelldudek@gmail.com', 'linkedin.com/in/russelldudek', 'https://russelldudek.github.io/MDC/']
          for filename, page_count in expected.items():
              path = base / 'docs' / filename
              assert path.is_file() and path.stat().st_size > 10000, f'invalid PDF: {filename}'
              reader = PdfReader(str(path))
              assert len(reader.pages) == page_count, f'{filename}: expected {page_count}, found {len(reader.pages)}'
              text = '\n'.join((page.extract_text() or '') for page in reader.pages)
              assert 'Skip to content' not in text
              for rx in private_terms:
                  assert not rx.search(text), f'private term in PDF: {filename}'
              if filename in {'Russell-Dudek-COO-AI-Adoption-Resume.pdf', 'Russell-Dudek-COO-AI-Adoption-Cover-Letter.pdf'}:
                  for contact in contacts:
                      assert contact in text, f'{contact} missing from {filename}'

          print('Publication validation passed.')
          PY

      - name: Record publication and clean bootstrap files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('campaign-audit.md')
          text = path.read_text(encoding='utf-8')
          old = 'Complete source and generated artifacts are ready for `main`. Live GitHub Pages verification must be performed after publication before the campaign is classified as fully complete.'
          new = 'Complete readable source and generated artifacts were published to `main` by the repository build. Live GitHub Pages verification remains required before the campaign is classified as fully complete.'
          assert old in text
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm -rf .bootstrap
          rm -f .github/workflows/publish-campaign.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

      - name: Commit complete campaign to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'candidate-campaign-publisher'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete COO candidate campaign'
          git push origin HEAD:main
