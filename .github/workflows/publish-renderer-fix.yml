name: Publish Promise Compiler renderer fix

on:
  push:
    paths:
      - .github/workflows/publish-renderer-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install renderer and scenario correction
        shell: bash
        run: |
          set -euo pipefail
          cat .publish/fix-*.b64 > /tmp/mdc-fix.b64
          base64 --decode /tmp/mdc-fix.b64 > /tmp/mdc-fix.tar.gz
          tar -xzf /tmp/mdc-fix.tar.gz -C .

          rm -rf .publish
          rm -f .github/workflows/publish-renderer-fix.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

          git config user.name 'candidate-campaign-publisher'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix Promise Compiler renderer and decision scenarios'
          git push origin HEAD:main
